<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employment by Occupation & Gender (2024)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Employment by Occupation & Gender (2024)</h1>
        <p class="description">
            The interactive bar chart displays the number of United States employed persons (in thousands) for five major occupational categories of the Bureau of Labor Statistics. 
            The dropdown menu below can be used to explore the categorized data.
        </p>
        
        <div class="controls">
            <label for="demographic-select"><strong>Select Demographic:</strong></label>
            <select id="demographic-select">
                <option value="total">Total Employed</option>
                <option value="men">Men</option>
                <option value="women">Women</option>
            </select>
        </div>

        <div id="tooltip" class="tooltip" style="opacity: 0;"></div>

        <div id="chart"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
